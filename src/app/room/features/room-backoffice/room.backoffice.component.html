<div class="flex flex-col justify-center items-center mx-2 md:ml-96 md:w-2/3">
    <h2 class="text-center text-4xl font-bold font-roboto p-4">Salles</h2>
    <app-datatable
        [data]="rooms"
        [displayColumns]="displayColumns()"
        (onDeleteId)="handleDeleteRoom($event)"
        (onEditItem)="handleEditRoom($event)"
        class="w-full"
    />
    <button
        class="my-6 mx-auto w-48 bg-peach rounded-lg p-2 font-bold text-sm flex justify-between items-center cursor-pointer"
        (click)="onDisplayForm()"
        (keyup.enter)="onDisplayForm()"
        tabindex="0"
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-10"
            [ngStyle]="{ display: isDisplayAddForm() ? 'none' : 'block' }"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
        </svg>
        <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-10"
            [ngStyle]="{ display: isDisplayAddForm() ? 'block' : 'none' }"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
        </svg>
        ajouter une salle
    </button>
    @if (isShowingExist()) {
        <p class="text-red-600 text-center">
            La mise à jour n'est pas possible pour cette salle, des séances
            existent et le nombre de siège est définitif
        </p>
    }
    @if (isDisplayAddForm()) {
        <h3 class="font-bold text-2xl text-center">Ajouter</h3>
        <app-form
            [formModelConfig]="formModelConfig"
            (outputForm)="handleAddRoom($event)"
            (displayForm)="handleCloseForm($event)"
            class="w-80 m-auto md:w-96"
        />
    }
    @if (isDiplayEditForm() && !this.isShowingExist()) {
        <h3 class="font-bold text-2xl text-center">Modifier</h3>
        <app-form
            [formModelConfig]="formModelConfig"
            [currentItem]="currentRoomDisplayOnForm()"
            (outputForm)="handleUpdateRoom($event)"
            (displayForm)="handleCloseForm($event)"
            class="w-80 md:w-96 m-auto"
        />
    }
</div>
