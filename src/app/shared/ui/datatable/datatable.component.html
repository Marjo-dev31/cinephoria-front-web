<section class="border-collapse overflow-x-auto min-w-full">
    <cdk-table [dataSource]="dataSource()" class="min-w-full">
        @for (column of displayColumns(); track column.key) {
            <ng-container [cdkColumnDef]="column.key" class="flex flex-col">
                <cdk-header-cell
                    *cdkHeaderCellDef
                    class="flex-1 p-2 text-center font-semibold capitalize"
                >
                    {{ column.label }}
                </cdk-header-cell>
                <cdk-cell *cdkCellDef="let row" class="flex-1 p-2 text-center">
                    {{ column.accessor(row) }}
                </cdk-cell>
            </ng-container>
        }

        <ng-container cdkColumnDef="action" class="flex flex-col w-fit">
            <cdk-header-cell
                *cdkHeaderCellDef
                class="flex-1 p-2 text-center font-semibold capitalize w-fit"
            >
                Action
            </cdk-header-cell>
            <cdk-cell
                *cdkCellDef="let row"
                class="flex-1 p-2 text-center flex flex-col md:flex-row justify-evenly"
            >
                @if (isReviewData()) {
                    <button
                        class="cursor-pointer"
                        (click)="changeStatus(row.id)"
                        (keyup.enter)="changeStatus(row.id)"
        tabindex="0"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            class="size-6"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 0 0-3.7-3.7 48.678 48.678 0 0 0-7.324 0 4.006 4.006 0 0 0-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 0 0 3.7 3.7 48.656 48.656 0 0 0 7.324 0 4.006 4.006 0 0 0 3.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3-3 3"
                            />
                        </svg>
                    </button>
                } @else if (isOrderData()) {
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M18.364 18.364A9 9 0 0 0 5.636 5.636m12.728 12.728A9 9 0 0 1 5.636 5.636m12.728 12.728L5.636 5.636"
                        />
                    </svg>
                } @else {
                    <button class="cursor-pointer" (click)="deleteItem(row.id)" (keyup.enter)="deleteItem(row.id)"
        tabindex="0">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            class="size-6"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                            />
                        </svg>
                    </button>
                    <button (click)="editItem(row)" (keyup.enter)="editItem(row)"
        tabindex="0" class="cursor-pointer">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            class="size-6"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"
                            />
                        </svg>
                    </button>
                }
            </cdk-cell>
        </ng-container>

        <cdk-header-row
            *cdkHeaderRowDef="columnKeys()"
            class="flex bg-sage/30 border border-darkblue min-w-fit"
        ></cdk-header-row>
        <cdk-row
            *cdkRowDef="let row; columns: columnKeys()"
            class="flex border border-darkblue min-w-fit"
        ></cdk-row>
    </cdk-table>
    @if (!dataSource().length) {
        <p class="text-center p-4 font-semibold">Aucun enregistrement</p>
    }
</section>
