<div class="flex flex-col justify-center items-center mx-2 md:ml-96 ">
    <h2 class="text-center text-4xl font-bold font-roboto p-4">Salles</h2>
    <app-datatable
        [data]="movies"
        [displayColumns]="displayColumns()"
        (onDeleteId)="handleDeleteMovie($event)"
        (onEditItem)="handleEditMovie($event)"
        class="w-full"
    />
    <button
        class="my-6 mx-auto w-48 bg-peach rounded-lg p-2 font-bold text-sm flex justify-between items-center cursor-pointer"
        (click)="onDisplayForm()"
        (keyup.entet)="onDisplayForm()"
        tabindex="0"
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-10"
            [ngStyle]="{ display: isDisplayAddForm() ? 'none' : 'block' }"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
        </svg>
        <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-10"
            [ngStyle]="{ display: isDisplayAddForm() ? 'block' : 'none' }"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
        </svg>

        ajouter un film
    </button>
    @if (isDisplayAddForm()) {
        <h3 class="font-bold text-2xl text-center">Ajouter</h3>
        <app-form
            [formModelConfig]="formModelConfig"
            (outputForm)="handleAddMovie($event)"
            (displayForm)="handleCloseForm($event)"
            (fileOutput)="handleUploadFile($event)"
            class="w-80 m-auto md:w-96"
        />
    }
    @if (isDiplayEditForm()) {
        <h3 class="font-bold text-2xl text-center">Modifier</h3>
        <app-form
            [formModelConfig]="formModelConfig"
            [currentItem]="currentMovieDisplayOnForm()"
            (outputForm)="handleUpdateMovie($event)"
            (displayForm)="handleCloseForm($event)"
            class="w-80 md:w-96 m-auto"
        />
    }
</div>
