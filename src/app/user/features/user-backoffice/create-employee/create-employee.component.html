<div class="flex flex-col justify-center items-center mx-2 md:ml-96 md:w-2/3">
    <h2 class="text-center text-4xl font-bold font-roboto p-4 capitalize">
        gérer compte employé
    </h2>
        <h3 class="font-bold text-2xl">Créer un compte</h3>
        <app-form
            [formModelConfig]="formModelConfig"
            (outputForm)="handleAddEmployeeAccount($event)"
            class="w-96"
        >
        </app-form>

    <div class="my-10 w-96">
        <h3 class="font-bold text-2xl text-center">Changer un mot de passe</h3>
        <app-form
            [formModelConfig]="formModelUpdatePassword"
            (outputForm)="handleUpdatePassword($event)"
        ></app-form>
    </div>
</div>
